services:
  mongodb:
    image: mongo:latest
    container_name: local_mongodb
    restart: always
    env_file:
      - .env
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD}
    ports:
      - "27017:27017"
    volumes:
      - ./backend/db/mongodb/data:/data/db
      - ./backend/db/mongodb/schema/init-db.js:/docker-entrypoint-initdb.d/init-db.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  weaviate:
    image: semitechnologies/weaviate:1.34.1
    container_name: local_weaviate
    ports:
      - "8080:8080"
      - "50051:50051"
    restart: always
    env_file:
      - .env
    environment:
      - QUERY_DEFAULTS_LIMIT=5
      - AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED=true
      - AUTHENTICATION_APIKEY_ENABLED=true
      - AUTHENTICATION_APIKEY_USERS=${WEAVIATE_APIKEY_USER}
      - AUTHENTICATION_APIKEY_ALLOWED_KEYS=${WEAVIATE_APIKEY_KEY}
      - CORS_ALLOW_ORIGIN=http://localhost:3000
      - CORS_ALLOW_HEADERS=Content-Type,Authorization,X-API-KEY
      - CORS_ALLOW_METHODS=GET,POST,PUT,PATCH,DELETE,OPTIONS
      - PERSISTENCE_DATA_PATH=/var/lib/weaviate
      - CLUSTER_HOSTNAME=node_local
    volumes:
      - ./backend/db/weaviate/data:/var/lib/weaviate
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:8080/v1/.well-known/ready >/dev/null 2>&1 || exit 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  # weaviate-console:
  #   image: semitechnologies/weaviate-console:latest
  #   container_name: weaviate_console
  #   ports:
  #     - "3000:80"
  #   environment:
  #     - WEAVIATE_URL=http://localhost:8080
  #   depends_on:
  #     weaviate:
  #       condition: service_healthy


  fastapi-backend:
    container_name: fastapi-backend
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile_fastapi
    restart: always
    env_file:
      - .env
    ports:
      - "8000:8000"
    environment:
      - WEAVIATE_APIKEY_KEY=${WEAVIATE_APIKEY_KEY}
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - WEAVIATE_HOST=weaviate
      - EMBEDDING_SERVER_URL=http://host.docker.internal:8008/embed
      - PHOENIX_COLLECTOR_ENDPOINT=http://phoenix:6006/v1/traces
      - LOKI_ENDPOINT=http://loki:3100/loki/api/v1/push
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      weaviate:
        condition: service_healthy
      phoenix:
        condition: service_healthy

  frontend:
    container_name: frontend
    build: 
      context: .
      dockerfile: dockerfiles/Dockerfile_frontend
    ports:
      - "8501:8501"
    environment:
      - FASTAPI_BACKEND_URL=http://fastapi-backend:8000
    depends_on:
      - fastapi-backend

  phoenix:
    image: arizephoenix/phoenix:latest
    container_name: phoenix
    ports:
      - "6006:6006"
      - "4317:4317"
    restart: always
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:6006/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  loki:
    container_name: loki
    image: grafana/loki:latest
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped

  grafana:
    container_name: grafana
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_PATHS_PROVISIONING=/tmp/provisioning
    entrypoint:
      - sh
      - -euc
      - |
        mkdir -p /tmp/provisioning/datasources
        cat <<EOF > /tmp/provisioning/datasources/loki.yaml
        apiVersion: 1
        datasources:
        - name: Loki
          type: loki
          access: proxy
          url: http://loki:3100
          isDefault: true
        EOF
        exec /run.sh
    depends_on:
      - loki
    restart: unless-stopped

  scraper:
    container_name: wikipedia_scraper
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile_scraper
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./data/wiki_dumps:/app/data/wiki_dumps
    env_file:
      - .env
    profiles: ["tools"]